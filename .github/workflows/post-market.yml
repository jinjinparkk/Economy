name: Post-Market Analysis

on:
  schedule:
    # 매일 KST 15:50 = UTC 06:50
    - cron: '50 6 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  post-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post-market pipeline
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
          WP_SITE_ID: ${{ secrets.WP_SITE_ID }}
          WP_AUTO_PUBLISH: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_AUTO_POST: 'true'
          NAVER_ACCESS_TOKEN: ${{ secrets.NAVER_ACCESS_TOKEN }}
          NAVER_AUTO_PUBLISH: 'true'
          OUTPUT_DIR: ./output
          TIMEZONE: Asia/Seoul
        run: python -m src.main --top 3

      - name: Commit output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/*.md output/*.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: $(date +%Y-%m-%d) 장마감 분석"
          git push

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-market-${{ github.run_number }}
          path: output/
          retention-days: 30
